name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run
      - run: npx vitest run --coverage
      - uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: false
